name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: npm install

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Check important files
        run: |
          test -f index.html
          test -f contact.html
          test -f style.css

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy info
        run: echo "Deployment handled by Render"
